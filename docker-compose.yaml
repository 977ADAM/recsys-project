services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recsys-api
    environment:
      APP_NAME: Recsys API
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://recsys:recsys@postgres:5432/recsys
      REDIS_URL: redis://redis:6379/0
      EVENT_LOG_PATH: out/events/events.jsonl
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.2.5-bookworm
    container_name: recsys-redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - rddata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:18.1-bookworm
    container_name: recsys-postgres
    environment:
      POSTGRES_DB: recsys
      POSTGRES_USER: recsys
      POSTGRES_PASSWORD: recsys
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recsys -d recsys"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

volumes:
  rddata:
  pgdata:
  
