services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recsys-api
    environment:
      APP_NAME: Recsys API
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://recsys:recsys@postgres:5432/recsys
      INFERENCE_URL: http://inference:8080
      REDIS_URL: redis://redis:6379/0
      EVENT_LOG_PATH: out/events/events.jsonl
    ports:
      - "8080:8080"
    depends_on:
      inference:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  inference:
    build:
      context: .
      dockerfile: Dockerfile.inference
    container_name: recsys-inference
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: recsys-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: recsys-postgres
    environment:
      POSTGRES_DB: recsys
      POSTGRES_USER: recsys
      POSTGRES_PASSWORD: recsys
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recsys -d recsys"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis_data:
  postgres_data:
